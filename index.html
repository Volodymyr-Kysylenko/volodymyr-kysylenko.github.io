<!DOCTYPE html>
<html>

<head>
  <title>Volodymyr Kysylenko CV | Project Manager</title>
  <meta name="keywords" content="Volodymyr Kysylenko, Володимир Кисиленко">
  <meta charset="UTF-8">

  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="./all.js"></script>
</head>

<body>
  <div class="rot">
  </div>
  <div id="navbar" class="sidenav">
    <a class="point" href="#one">Welcome</a>
    <a class="point" href="#two">About me</a>
    <a class="point" href="#three">Expirience</a>
    <a class="point" href="#four">Projects</a>
    <a class="point" href="#five">Skills</a>
    <a class="point" href="#six">Contact me</a>
  </div>
  <div class="outer-wrapper">
    <div class="wrapper">

      <div id="one" class="slide one">
        <div class="text-name">VOLODYMYR KYSYLENKO</div>
        <div class="text-position">PROJECT MANAGER</div>
        <div class="img-photo"></div>
        <div class="fact">Just facts</div>
        <div class="fact-list">
            <ul>
              <li class="first-fact">&#9654; 24 years old, live in Kyiv</li>
              <li class="second-fact">&#9654; started as engineer</li>
              <li class="third-fact">&#9654; more then two years expirience in PM</li>
              <li class="fourth-fact">&#9654; work hard</li>
              <li class="fifth-fact">&#9654; want to work at your company</li>
            </ul>
        </div>
      </div>


      <div id="two" class="slide two">
        <p>Текст</p>
      </div>
      <div id="three" class="slide three"></div>
      <div id="four" class="slide four"></div>
    </div>
  </div>

  <script>
    //* Add active class to the current button (highlight it)
    var header = document.getElementById("navbar");
    var btns = header.getElementsByClassName("point");
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener("click", function () {
        var current = document.getElementsByClassName("active");
        if (current.length > 0) {
          current[0].className = current[0].className.replace(" active", "");
        }
        this.className += " active";
      });
    }
  </script>

  <script>
    const anchors = document.querySelectorAll('a[href*="#"]')

    for (let anchor of anchors) {
      anchor.addEventListener('click', function (e) {
        e.preventDefault()

        const blockID = anchor.getAttribute('href').substr(1)

        document.getElementById(blockID).scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        })
      })
  </script>
</body>
</html>
